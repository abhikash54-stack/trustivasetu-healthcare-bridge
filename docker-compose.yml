services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trustiva
      POSTGRES_PASSWORD: trustiva
      POSTGRES_DB: trustiva_lms
    volumes:
      - trustiva_pg_data:/var/lib/postgresql/data

volumes:
  trustiva_pg_data:
